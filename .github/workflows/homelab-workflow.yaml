name: homelab-workflow
on:
  push:
    branches: [ "master", "dev" ]

jobs:
  test:
    name: Run maven tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test

  build-and-push:
    name: Build and push docker image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      current_tag: ${{ steps.project_version.outputs.version }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Setup JSK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Get current version
        id: project_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build jar file
        run: mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/docker-login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_API_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/homelab-app:${{ steps.project_version.outputs.version }}

  bump-version:
    name: Bump and sync version
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Bump Version in pom.xml
        run: |
          mvn build-helper:parse-version versions:set \
          -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion} \
          versions:commit

      - name: Get new version
        id: new_project_version
        run: |
          NEW_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Push new version to Master
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bumped to version: ${{ steps.new_project_version.outputs.version }} [skip ci]"
          git push origin master

      - name: Merge new version to Dev
        run: |
          git checkout dev
          git merge master
          git push origin dev
          echo "Merged new version ${{ steps.new_project_version.outputs.version }} to dev"
  update-gitops:
    name: Update gitops kustomize
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: daemia8702/homelab-ops/.github/workflows/shared-deploy.yml@main
    with:
      app_name: homelab-app
      image_tag: ${{ needs.build-and-push.outputs.current_tag }}
    secrets: ${{ secrets.HOMELAB_OPS_SECRET }}

